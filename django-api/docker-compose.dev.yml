services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: papermind
      POSTGRES_USER: papermind_user
      POSTGRES_PASSWORD: papermind_pass
    ports:
    - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
volumes:
  postgres_data: 